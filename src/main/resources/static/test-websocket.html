<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>WebSocket 消息广播测试</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
</head>
<body>
<h2>WebSocket 消息广播测试</h2>
<div>
    <input type="text" id="message" placeholder="输入消息" />
    <button onclick="sendMessage()">发送</button>
</div>
<div id="messages" style="border:1px solid #ccc; margin-top:10px; padding:5px; height:200px; overflow:auto;"></div>

<script>
    var socket = new SockJS('/ws');
    var stompClient = Stomp.over(socket);
    stompClient.connect({}, function(frame) {
        console.log('Connected: ' + frame);
        stompClient.subscribe('/topic/messages', function(message) {
            var msgDiv = document.getElementById('messages');
            var data = JSON.parse(message.body);
            msgDiv.innerHTML += '<div>收到: ' + data.content + '</div>';
        });
    });

    function sendMessage() {
        var input = document.getElementById('message');
        var content = input.value;
        if (content) {
            stompClient.send("/app/chat", {}, JSON.stringify({sender: "test", content: content}));
            input.value = '';
        }
    }
</script>
</body>
</html>
